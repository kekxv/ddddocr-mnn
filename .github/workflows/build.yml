name: Build and Release

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: linux-x86_64
            artifact_name: ocrCaptchaMnn
          - os: windows-latest
            arch: windows-x86_64
            artifact_name: ocrCaptchaMnn.exe
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Set up build environment (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libopencv-dev \
            libopencv-core-dev

      - name: Set up build environment (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install opencv -y

      - name: Create build directory
        run: cmake -E make_directory build

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        working-directory: build
        run: cmake -DCMAKE_BUILD_TYPE=Release ..

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        working-directory: build
        run: cmake -G "Visual Studio 17 2022" -A x64 ..

      - name: Build project (Linux)
        if: runner.os == 'Linux'
        working-directory: build
        run: make -j$(nproc)

      - name: Build project (Windows)
        if: runner.os == 'Windows'
        working-directory: build
        run: cmake --build . --config Release

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        working-directory: build
        run: |
          echo "========================================" 
          echo "Running Tests"
          echo "========================================"
          ctest --output-on-failure -V
          echo "========================================"
          echo "Tests completed"
          echo "========================================"

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        working-directory: build
        run: |
          echo "========================================"
          echo "Running Tests"
          echo "========================================"
          ctest --output-on-failure -V -C Release
          echo "========================================"
          echo "Tests completed"
          echo "========================================"

      - name: Generate test report
        if: always()
        run: |
          mkdir -p test-results
          echo "Test Report - $(date)" > test-results/test-report.txt
          echo "========================================" >> test-results/test-report.txt
          echo "Platform: ${{ runner.os }}" >> test-results/test-report.txt
          echo "Architecture: ${{ matrix.arch }}" >> test-results/test-report.txt
          echo "========================================" >> test-results/test-report.txt
          if [ -f "build/Testing/Temporary/LastTestsFailed.log" ]; then
            echo "Failed Tests:" >> test-results/test-report.txt
            cat build/Testing/Temporary/LastTestsFailed.log >> test-results/test-report.txt
          else
            echo "All tests passed!" >> test-results/test-report.txt
          fi
          cat test-results/test-report.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.arch }}
          path: test-results/
          retention-days: 30

      - name: Prepare artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifacts
          cp build/ocrCaptchaMnn artifacts/
          cp ocr.captcha.sim.mnn artifacts/
          cp words.h artifacts/
          cp OcrCaptcha.hpp artifacts/
          chmod +x artifacts/ocrCaptchaMnn

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          mkdir artifacts
          copy build\Release\ocrCaptchaMnn.exe artifacts\
          copy ocr.captcha.sim.mnn artifacts\
          copy words.h artifacts\
          copy OcrCaptcha.hpp artifacts\

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ocrCaptchaMnn-${{ matrix.arch }}
          path: artifacts/
          retention-days: 7

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/${{ matrix.artifact_name }}
            artifacts/ocr.captcha.sim.mnn
            artifacts/words.h
            artifacts/OcrCaptcha.hpp
          body: |
            ## Build Information
            - Build Date: ${{ github.event.head_commit.timestamp }}
            - Commit: ${{ github.event.head_commit.message }}
            
            ## Files Included
            - `ocrCaptchaMnn`: Compiled executable
            - `ocr.captcha.sim.mnn`: Model file
            - `words.h`: Word definitions
            - `OcrCaptcha.hpp`: Header file
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
